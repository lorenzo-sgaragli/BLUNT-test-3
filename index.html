        .screen.active { display: flex; flex-direction: column; gap: 15px; }

        .input-group { display: flex; flex-direction: column; gap: 6px; text-align: left; margin-bottom: 15px; }
        label { font-size: 0.85rem; color: #dfb299; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        input { background: rgba(0, 0, 0, 0.4); border: 2px solid #5c3e2f; padding: 14px; border-radius: 14px; color: white; font-size: 1.1rem; width: 100%; font-weight: 600; }
        input:focus { border-color: var(--gold); outline: none; }
        
        button { cursor: pointer; border: none; padding: 16px; border-radius: 14px; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; width: 100%; transition: transform 0.1s; }

        .btn-main { background: linear-gradient(135deg, var(--accent) 0%, #ff5e62 100%); color: white; box-shadow: 0 6px 20px rgba(255, 42, 95, 0.4); }
        .btn-secondary { background: transparent; color: #ffd700; border: 2px solid #ffd700; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1); }

        #screen-game { max-width: 100vw; width: 100%; display: none; flex-direction: column; gap: 10px; align-items: center; }
        #screen-game.active { display: flex; }

        .mazzo-fisico { position: absolute; width: 100%; height: 100%; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; text-transform: uppercase; text-align: center; font-weight: 900; padding: 4px; letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .mazzo-domande { background: linear-gradient(135deg, #111 0%, #222 100%); color: #fff; }
        .mazzo-risposte { background: linear-gradient(135deg, #fff 0%, #eee 100%); color: #111; border-color: #fff; }

        .centro-contenuti { position: absolute; right: 16%; width: 48%; height: 70%; display: flex; flex-direction: column; justify-content: space-between; z-index: 3; padding: 5px 0; }

        .posto-giocatore { position: absolute; width: 75px; height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
        .player-name-tag { font-size: 0.6rem; font-weight: 800; background: #2b1a11; color: #ffd700; width: 72px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 1px solid #6e442c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }

        .area-mano-privata { width: 100%; max-width: 450px; background: linear-gradient(to top, #161210 0%, #261e1a 100%); border-radius: 20px 20px 0 0; padding: 12px; border-top: 3px solid #5c3e2f; }
        .scroll-mano { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; align-items: flex-end; height: 165px; }

        .carta-mano-reale { flex: 0 0 96px; height: 130px; background: linear-gradient(135deg, #ffffff 0%, #f1f1f1 100%); color: #111; border-radius: 10px; padding: 8px; font-size: 0.8rem; font-weight: 700; text-align: left; border: none; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: transform 0.2s, border-color 0.2s; position: relative; }
        .carta-mano-reale.selezionata { transform: translateY(-18px) scale(1.05); border: 3px solid var(--neon-confirm); box-shadow: 0 10px 20px rgba(255, 153, 0, 0.4); }

        function mescolaArray(array) {
            let copia = [...array];
            for (let i = copia.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copia[i], copia[j]] = [copia[j], copia[i]];
            }
            return copia;

        function creaStanza() {
            const inputNome = document.getElementById("username").value.trim();
            if (!inputNome || inputNome.length > 8) return alert("Nickname non valido!");
            mioNome = inputNome;
            codiceStanzaCorrente = Math.random().toString(36).substring(2, 6).toUpperCase();

            const mazzoRisposteShufflato = mescolaArray(mazzoLocale.risposte);

            database.ref("stanze/" + codiceStanzaCorrente).set({
                stato: "attesa",
                creatore: mioNome,

                domandaCorrente: "",
                showroomAperto: false,

            });
        }

        function entraInStanza() {
            const inputNome = document.getElementById("username").value.trim();
            const inputCodice = document.getElementById("room-code").value.trim().toUpperCase();
            if (!inputNome || !inputCodice) return alert("Dati mancanti!");
            mioNome = inputNome; codiceStanzaCorrente = inputCodice;

            database.ref("stanze/" + codiceStanzaCorrente).once("value", (snapshot) => {
                if (!snapshot.exists()) return alert("Tavolo non trovato.");
                if (snapshot.child("giocatori").hasChild(mioNome)) return alert("Nickname già presente!");
                const occupati = snapshot.child("giocatori").numChildren();
                if (occupati >= 10) return alert("Tavolo pieno!");

                configuraPresenzaGiocatore(occupati);
            });
        }

            userRef.set({ punti: 0, sedia: indiceSedia }).then(() => {
                userRef.onDisconnect().remove();
                document.getElementById("lobby-title").innerText = mazzoLocale.tavoloTitolo + codiceStanzaCorrente;
                if (indiceSedia === 0) document.getElementById("start-game-btn").style.display = "block";
                mostraSchermata("screen-lobby"); 
                ascoltaTavolo();
            });
        }

        function avviaPartita() {
            const stanzaRef = database.ref("stanze/" + codiceStanzaCorrente);
            stanzaRef.once("value", (snapshot) => {
                const stanza = snapshot.val();
                const giocatori = stanza.giocatori;
                const nomiGiocatori = Object.keys(giocatori);
                const mazzo = stanza.mazzoCondiviso;
                
                let indiceMazzo = 0;
                let aggiornamentiMani = {};

                nomiGiocatori.forEach((nome) => {
                    let miaManoFissa = mazzo.slice(indiceMazzo, indiceMazzo + 12); // Diamo 12 carte per gestire meglio le doppie
                    aggiornamentiMani[`giocatori/${nome}/mano`] = miaManoFissa;
                    indiceMazzo += 12;
                });

                aggiornamentiMani["indiceMazzoCorrente"] = indiceMazzo;
                aggiornamentiMani["stato"] = "gioco";
                stanzaRef.update(aggiornamentiMani);
            });
        }

            const stanza = snapshot.val();
            const anello = document.getElementById("posti-anello");

            const giocatori = stanza.giocatori || {}; 
            const elencoNomi = Object.keys(giocatori);
            const amI_Zar = (stanza.zar === mioNome);

            elencoNomi.forEach((nomeG, idx) => {
                const datiG = giocatori[nomeG];
                const angolo = (idx * (360 / elencoNomi.length)) * (Math.PI / 180); 
                const raggioAvatar = 37; const raggioTesti = 52; 

                const ax = 50 + raggioAvatar * Math.cos(angolo); const ay = 50 + raggioAvatar * Math.sin(angolo);
                const tx = 50 + raggioTesti * Math.cos(angolo); const ty = 50 + raggioTesti * Math.sin(angolo);

                const divPosto = document.createElement("div");
                divPosto.className = "posto-giocatore";
                divPosto.style.left = `${ax}%`; divPosto.style.top = `${ay}%`; divPosto.style.transform = `translate(-50%, -50%)`;

                }
                
                let testoBadge = mazzoLocale.conferma;
                if (maxRichieste === 2) {
                    testoBadge = posSelezione === 0 ? "1° CARTA 📌" : "CONFERMA TOCCO 🎯";
                }

                card.innerHTML = `
                    <div class="badge-conferma" style="${posSelezione !== -1 ? 'display:block;' : ''}">${testoBadge}</div>
                    <span>${testo}</span>
                    <span style="font-size:0.5rem; text-align:right; font-weight:900; color:#aaa;">BLUNT</span>
                `;
                
                if (amI_Zar || giaGiocato || !stanza.domandaCorrente || stanza.vincitoreFaseFinale) card.disabled = true;

                card.onclick = function(e) {
                    e.stopPropagation();
                    
                    if (posSelezione !== -1) {
                        // Se clicca di nuovo sulla carta già pronta per essere l'ultimo pezzo del puzzle, esegui la mossa
                        if (carteSelezionateMano.length === maxRichieste) {
                            inviaMossaDefinitiva(stanza);
                        } else {
                            // Altrimenti deseleziona
                            carteSelezionateMano.splice(posSelezione, 1);
                            disegnaManoBassa(stanza, amI_Zar);
                        }
                    } else {
                        // Aggiunge la carta alla selezione
                        if (carteSelezionateMano.length < maxRichieste) {
                            carteSelezionateMano.push(idx);
                        }
                        
                        // Se ha completato la selezione richiesta e la domanda voleva solo 1 carta, invia subito
                        if (carteSelezionateMano.length === maxRichieste && maxRichieste === 1) {
                            inviaMossaDefinitiva(stanza);
                        } else {
                            disegnaManoBassa(stanza, amI_Zar);
                        }
                    }
                };
                handDiv.appendChild(card);
            });
        }

function inviaMossaDefinitiva(stanza) {
    // Estrae i testi in base all'ordine di selezione del giocatore
    const stringheScelte = carteSelezionateMano.map(i => mieCarteBianche[i]);
    
    // Rimuove gli indici usati dalla mano locale dal valore più alto al più basso
    let nuovaManoFlussata = [...mieCarteBianche];
    // CORRETTO: rimosso lo spazio nella variabile
    const indiciOrdinatiDecrescente = [...carteSelezionateMano].sort((a,b) => b-a);
    indiciOrdinatiDecrescente.forEach(i => nuovaManoFlussata.splice(i, 1));

    // Rigenera pescando dal mazzo globale condiviso
    const mazzo = stanza.mazzoCondiviso;
    let indiceAttuale = stanza.indiceMazzoCorrente || 0;
    
    while (nuovaManoFlussata.length < 12 && mazzo[indiceAttuale]) {
        nuovaManoFlussata.push(mazzo[indiceAttuale]);
        indiceAttuale++;
    }

    let invioTransazione = {};
    invioTransazione[`giocatori/${mioNome}/mano`] = nuovaManoFlussata;
    invioTransazione[`indiceMazzoCorrente`] = indiceAttuale;
    invioTransazione[`carteGiocate/${mioNome}`] = stringheScelte.join(" | ");

    database.ref("stanze/" + codiceStanzaCorrente).update(invioTransazione).then(() => {
        carteSelezionateMano = [];
    });
}

        function disegnaBancoCentrale(snapshot, amI_Zar, totaleGiocatori) {
            const stanza = snapshot.val();
            const banco = document.getElementById("banco-carte");
            const triggerBox = document.getElementById("showroom-trigger-box");
            banco.innerHTML = "";
            triggerBox.innerHTML = "";

            const carteGiocate = stanza.carteGiocate || {};
            const numeroGiocatoriCheHannoMosso = Object.keys(carteGiocate).length;
            const targetRichiesto = totaleGiocatori - 1;

            // Mostriamo visivamente un blocco sul tavolo per ogni mossa ricevuta
            for (let i = 0; i < numeroGiocatoriCheHannoMosso; i++) {
                const minicarta = document.createElement("div");
                minicarta.className = "mini-carta-banco";
                banco.appendChild(minicarta);
            }

            if (amI_Zar && numeroGiocatoriCheHannoMosso >= targetRichiesto && targetRichiesto > 0 && !stanza.showroomAperto) {
                const btnShow = document.createElement("button");
                btnShow.className = "btn-main";
                btnShow.style.padding = "8px";
                btnShow.style.fontSize = "0.8rem";
                btnShow.innerText = mazzoLocale.scopriCarte;
                btnShow.onclick = () => {
                    database.ref("stanze/" + codiceStanzaCorrente).update({ showroomAperto: true });
                };
                triggerBox.appendChild(btnShow);
            }
        }

        function costruisciShowroomEsecuzione(stanza) {
            const layer = document.getElementById("showroom-layer");
            layer.classList.add("active");

            document.getElementById("show-domanda-testo").innerText = stanza.domandaCorrente;
            const centroDinamico = document.getElementById("show-contenitore-dinamico");
            const votoBox = document.getElementById("show-container-voto-definitivo");
            const miniatureList = document.getElementById("show-miniature-list");

            centroDinamico.innerHTML = ""; votoBox.innerHTML = ""; miniatureList.innerHTML = "";

            const carteGiocate = stanza.carteGiocate || {};
            const arrChiavi = Object.keys(carteGiocate);
            
            const proprietarioCorrente = arrChiavi[indexShowroomCorrente];
            const bloccoTestoUnito = carteGiocate[proprietarioCorrente];

            if (bloccoTestoUnito) {
                // Separa le carte se c'è la Pipe " | "
                const singoleCarte = bloccoTestoUnito.split(" | ");
                
                singoleCarte.forEach((testoSingolo) => {
                    const focusCard = document.createElement("div");
                    focusCard.className = "showroom-carta-corrente-focus";
                    focusCard.innerHTML = `<span>${testoSingolo}</span><span style='font-size:0.7rem; color:var(--accent); font-weight:900; text-align:right;'>BLUNT</span>`;
                    centroDinamico.appendChild(focusCard);
                });

                if (stanza.zar === mioNome) {
                    const btnVota = document.createElement("button");
                    btnVota.className = "btn-main";
                    btnVota.innerText = mazzoLocale.votaCarta;
                    btnVota.onclick = () => {
                        proclamaVincitoreRound(proprietarioCorrente, bloccoTestoUnito);
                    };
                    votoBox.appendChild(btnVota);
                }
            }

            arrChiavi.forEach((chiave, idx) => {
                const minicard = document.createElement("div");
                minicard.className = "mini-scheda-letta" + (idx === indexShowroomCorrente ? " attiva" : "");
                minicard.innerText = `Set ${idx + 1}`;
                minicard.onclick = () => {
                    indexShowroomCorrente = idx;
                    costruisciShowroomEsecuzione(stanza);
                };
                miniatureList.appendChild(minicard);
            });
        }

        function proclamaVincitoreRound(proprietario, bloccoTesto) {
            database.ref("stanze/" + codiceStanzaCorrente + "/giocatori/" + proprietario + "/punti").transaction((puntiAttuali) => {
                return (puntiAttuali || 0) + 1;
            }).then(() => {
                database.ref("stanze/" + codiceStanzaCorrente).update({
                    vincitoreFaseFinale: JSON.stringify({ nome: proprietario, carte: bloccoTesto }),
                    showroomAperto: false
                });
            });
        }

        function eseguiScenografiaVittoriaInterattiva(stanza) {
            const dataVincitore = JSON.parse(stanza.vincitoreFaseFinale);
            const screenVic = document.getElementById("victory-screen");
            screenVic.classList.add("active");

            document.getElementById("vincitore-nome-banner").innerText = dataVincitore.nome;
            
            const renderBox = document.getElementById("vincitore-carta-box");
            renderBox.innerHTML = "";

            const pezzi = dataVincitore.carte.split(" | ");
            pezzi.forEach(p => {
                renderBox.innerHTML += `
                    <div style="background:white; color:black; width:220px; height:130px; border-radius:12px; padding:15px; text-align:left; font-size:1.1rem; font-weight:800; display:flex; flex-direction:column; justify-content:space-between; box-shadow:0 0 20px rgba(255,255,255,0.2);">
                        <span>${p}</span>
                        <span style="font-size:0.5rem; color:#ff2a5f; font-weight:900; text-align:right;">BLUNT</span>
                    </div>
                `;
            });

            if (stanza.creatore === mioNome) {
                setTimeout(() => {
                    const giocatori = Object.keys(stanza.giocatori);
                    const indexZarAttuale = giocatori.indexOf(stanza.zar);
                    const prossimoZar = giocatori[(indexZarAttuale + 1) % giocatori.length];

                    database.ref("stanze/" + codiceStanzaCorrente).update({
                        domandaCorrente: "",
                        carteGiocate: "",
                        showroomAperto: false,
                        vincitoreFaseFinale: "",
                        zar: prossimoZar
                    });
                    indexShowroomCorrente = 0;
                }, 6000);
            }
        }
    </script>
